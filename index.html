function randName(len){
    const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
    let s='';
    for(let i=0;i<len;i++) s+=c[Math.floor(Math.random()*c.length)];
    return s;
}
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function byteToCustom(b){
    let l1=Math.floor(b/26), l2=b%26, l3=(l1+l2)%26, l4=(l1*l2)%26;
    return String.fromCharCode(97+l1,97+l2,97+l3,97+l4);
}
function encodeCustom(str){
    return Array.from(str).map(c=>byteToCustom(c.charCodeAt(0))).join('/');
}
function genMathExpr(target, steps){
    let cur=randInt(10000,50000), expr=''+cur;
    for(let i=0;i<steps-5;i++){
        let op=Math.random()>0.5?'+':'-';
        let v=randInt(1000,9999);
        if(op==='+'){ cur+=v; expr+=' + '+v; } else { cur-=v; expr+=' - '+v; }
    }
    expr += ' + bit32.bxor(105,105) - bit32.band(255,0)';
    let diff=target-cur;
    expr+=diff>=0?(' + '+diff):(' - '+Math.abs(diff));
    return '('+expr+')';
}
