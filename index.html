<script>
let currentMode = 'low';
let _rng = Math.random;
let _nameCounter = 0;

function setMode(mode) {
    currentMode = mode;
    var btns = document.querySelectorAll('.mode-btn');
    for (var i = 0; i < btns.length; i++) {
        btns[i].classList.remove('active');
    }
    var targetId = 'btn' + mode.charAt(0).toUpperCase() + mode.slice(1);
    var targetBtn = document.getElementById(targetId);
    if (targetBtn) targetBtn.classList.add('active');
}

function uploadFile() {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = '.lua,.luau,.txt';
    input.onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('txtOriginal').value = ev.target.result;
        };
        reader.readAsText(file);
    };
    input.click();
}

function seedRandom(seed) {
    var s = seed | 0;
    _rng = function() {
        s = (s + 0x6D2B79F5) | 0;
        var t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

function rng() { return _rng(); }

function randomName(len) {
    var chars = "Il1O0_";
    var name = "_";
    for (var i = 0; i < len; i++) {
        name += chars[Math.floor(rng() * chars.length)];
    }
    name += (_nameCounter++).toString(36);
    return name;
}

function toHexInt(n) {
    if (n === 0) return "0x0";
    var sign = n < 0 ? "-" : "";
    return sign + "0x" + Math.abs(n).toString(16);
}

function toUTF8Bytes(s) {
    var bytes = [];
    for (var i = 0; i < s.length; i++) {
        var c = s.charCodeAt(i);
        if (c < 0x80) bytes.push(c);
        else if (c < 0x800) bytes.push(0xc0 | (c >> 6), 0x80 | (c & 0x3f));
        else if (c >= 0xd800 && c <= 0xdbff && i + 1 < s.length) {
            var lo = s.charCodeAt(++i);
            c = ((c - 0xd800) << 10) + (lo - 0xdc00) + 0x10000;
            bytes.push(0xf0 | (c >> 18), 0x80 | ((c >> 12) & 0x3f), 0x80 | ((c >> 6) & 0x3f), 0x80 | (c & 0x3f));
        } else {
            bytes.push(0xe0 | (c >> 12), 0x80 | ((c >> 6) & 0x3f), 0x80 | (c & 0x3f));
        }
    }
    return bytes;
}

function b64Encode(bytes) {
    var chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
    var out = "";
    for (var i = 0; i < bytes.length; i += 3) {
        var b0 = bytes[i], b1 = bytes[i + 1] || 0, b2 = bytes[i + 2] || 0;
        out += chars[(b0 >> 2) & 0x3F];
        out += chars[((b0 << 4) | (b1 >> 4)) & 0x3F];
        out += (i + 1 < bytes.length) ? chars[((b1 << 2) | (b2 >> 6)) & 0x3F] : "=";
        out += (i + 2 < bytes.length) ? chars[b2 & 0x3F] : "=";
    }
    return out;
}

function lzssCompress(input) {
    var out = [];
    var WIN = 4096, MIN_MATCH = 3, MAX_MATCH = 18, HASH_SIZE = 1 << 16, HASH_MASK = HASH_SIZE - 1;
    var head = new Int32Array(HASH_SIZE);
    for (var hi = 0; hi < HASH_SIZE; hi++) head[hi] = -1;
    var prev = new Int32Array(input.length);
    for (var pi = 0; pi < input.length; pi++) prev[pi] = -1;
    function hash3(pos) {
        return ((input[pos] << 10) ^ (input[pos+1] << 5) ^ input[pos+2]) & HASH_MASK;
    }
    var i = 0;
    while (i < input.length) {
        var flagByte = 0;
        var flagPos = out.length;
        out.push(0);
        for (var bit = 0; bit < 8 && i < input.length; bit++) {
            var bestLen = 0, bestOff = 0;
            if (i + 2 < input.length) {
                var h = hash3(i);
                var j = head[h];
                var limit = Math.max(0, i - WIN);
                var chain = 0;
                while (j >= limit && chain < 48) {
                    var len = 0;
                    while (len < MAX_MATCH && i + len < input.length && input[j + len] === input[i + len]) len++;
                    if (len > bestLen) { bestLen = len; bestOff = i - j; }
                    if (len === MAX_MATCH) break;
                    j = prev[j];
                    if (j < 0) break;
                    chain++;
                }
                prev[i] = head[h];
                head[h] = i;
            }
            if (bestLen >= MIN_MATCH) {
                var encoded = ((bestOff - 1) << 4) | (bestLen - MIN_MATCH);
                out.push((encoded >> 8) & 0xFF);
                out.push(encoded & 0xFF);
                for (var s = 1; s < bestLen && i + s + 2 < input.length; s++) {
                    var sh = hash3(i + s);
                    prev[i + s] = head[sh];
                    head[sh] = i + s;
                }
                i += bestLen;
            } else {
                flagByte |= (1 << bit);
                out.push(input[i]);
                i++;
            }
        }
        out[flagPos] = flagByte;
    }
    return out;
}

function generateMathOps(target, steps) {
    var current = Math.floor(Math.random() * 40000) + 10000;

    for (var i = 0; i < steps - 5; i++) {
        var op = Math.random() > 0.5 ? '+' : '-';

function applyStringEncoding(luaCode, key, mode) {
    if (mode === 'low') return luaCode;
    var decoderName = '_clydeDec_' + Math.random().toString(36).substring(2, 8);
    var cacheName = '_c_' + Math.random().toString(36).substring(2, 6);
    var encRatio = mode === 'strong' ? 1.0 : (mode === 'medium' ? 0.7 : 0.3);

    var result = luaCode;
    var stringRegex = /"([^"\\]|\\.)*"/g;
    var strings = [];
    var m;
    while ((m = stringRegex.exec(luaCode)) !== null) {
        if (m[0].length > 2 && rng() < encRatio) {
            strings.push({full: m[0], val: m[0].slice(1, -1), index: m.index});
        }
    }

    for (var i = strings.length - 1; i >= 0; i--) {
        var s = strings[i];
        var bytes = [];
        for (var j = 0; j < s.val.length; j++) {

function applyControlFlow(luaCode, mode) {
    if (mode === 'low') return luaCode;
    var predicates = [
        '7*7==49', '1+1==2', '15*15==225', '100%7==2', '12*12==144', '3^2==9',
        'type("")=="string"', 'type(1)=="number"', '#""==0', 'not(1>2)'
    ];
    var lines = luaCode.split('\n');
    var result = [];
    for (var li = 0; li < lines.length; li++) {
        var line = lines[li];
        var trimmed = line.trim();
        if ((trimmed.indexOf('if ') === 0 || trimmed.indexOf('while ') === 0 || trimmed.indexOf('repeat ') === 0) && rng() < (mode === 'strong' ? 0.8 : 0.4)) {
