<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicObfuscator V1.0.4</title>
    <style>
        :root {
            --bg-color: #0d0614;
            --panel-color: #160d22;
            --accent-color: #7b2cbf;
            --accent-hover: #9d4edd;
            --text-color: #e0aaff;
            --border-color: #3c165a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin: 30px 0 10px 0;
            text-align: center;
        }

        header h1 {
            color: var(--accent-hover);
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 0 0 15px var(--accent-color);
        }

        header p {
            color: #7d7495;
            font-size: 0.95rem;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .panel label {
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--accent-hover);
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            height: 400px;
            background-color: #08030d;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-hover);
            box-shadow: 0 0 8px rgba(157, 78, 221, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(123, 44, 191, 0.3);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(157, 78, 221, 0.5);
        }

        #btnDownload {
            background-color: #3c165a;
            border: 1px solid var(--border-color);
        }

        #btnDownload:hover {
            background-color: #5a2086;
        }
    </style>
</head>
<body>

    <header>
        <h1>MagicObfuscator V1.0.4 Lua/Luau</h1>
        <p>Web MagicObfuscator helps protect your Lua/Luau code</p>
    </header>

    <div class="container">
        <div class="panel">
            <label for="txtOriginal">Mã Nguồn (Source Code)</label>
            <textarea id="txtOriginal" placeholder="Paste Code Here..."></textarea>
        </div>
        <div class="panel">
            <label for="txtObfuscated">Output</label>
            <textarea id="txtObfuscated" readonly placeholder=""></textarea>
        </div>
    </div>

    <div class="btn-group">
        <button id="btnObfuscate" onclick="processObfuscation()">Obfuscate</button>
        <button id="btnDownload" onclick="downloadFile()">Download</button>
    </div>

    <script>
        function generateLargeRandomString(length) {
            let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function generateMathOps(target, steps = 30) {
            let current = Math.floor(Math.random() * 40000) + 10000;
            let expr = '' + current;
            for (let i = 0; i < steps - 5; i++) {
                let op = Math.random() > 0.5 ? '+' : '-';
                let val = Math.floor(Math.random() * 9000) + 1000;
                if (op === '+') { current += val; expr += ' + ' + val; }
                else { current -= val; expr += ' - ' + val; }
            }
            expr += ' + bit32.bxor(105, 105) - bit32.band(255, 0)';

            let diff = target - current;
            if (diff >= 0) expr += ' + ' + diff;
            else expr += ' - ' + Math.abs(diff);
            return '(' + expr + ')';
        }

        function byteToCustomString(b) {
            let l1 = Math.floor(b / 26); let l2 = b % 26;
            let l3 = (l1 + l2) % 26; let l4 = (l1 * l2) % 26;
            return String.fromCharCode(97 + l1, 97 + l2, 97 + l3, 97 + l4);
        }

        function encodeToCustomFormat(str) {
            let parts = [];
            for (let i = 0; i < str.length; i++) {
                parts.push(byteToCustomString(str.charCodeAt(i)));
            }
            return parts.join('/');
        }

        function generateAntiTamper() {
            return `local _e=getfenv and getfenv() or _ENV;local _i=_e.debug and _e.debug.getinfo;if type(_i)=="function" then local c=pcall(function()return _i(2)end) if not c then while true do end end end;if _e.debugresults or _e._25ms then while true do end end;local _t=type(_e.table)=="table" and _e.table;if _t and type(getmetatable(_t))=="table" then while true do end end;`;
        }

        function generateAntiEnvLogger() {
            return `local secret={}local t=setmetatable({},{__index=function(_,k)return k=="MS911"and secret or"detected"end,__metatable="Locked",__tostring=function()return"pass"end})local function verifyStack()local trace=debug.traceback()if string.find(trace,"hook")or string.find(trace,"logger")then return false end return true end local success,result=pcall(function()local mt=getmetatable(t)if typeof(t)~="table"or mt~="Locked"or#mt~=6 or typeof(mt)~="string"then return"detected"end if tostring(t)~="pass"or tostring(t)~="pass"then return"detected"end if#t~=0 then return"detected"end if typeof(verifyStack)~="function"or iscclosure(verifyStack)then return"detected"end if getfenv(1)~=getfenv(0)and getfenv(1)==nil then return"detected"end if not rawequal(t.MS911,secret)or not verifyStack()then return"detected"end return"pass"end)if success and result=="pass"then print("passed")else print("detected")end`;
        }

        function generateAntiDebug() {
            return `local function _antiDebug()local s=tick()local d=0 for i=1,1000000 do d=d+1 end local e=tick()if(e-s)>0.08 then local f=tick()while tick()-f<10 do end end end _antiDebug()`;
        }

        function generateOpcode() {
            return `local function _opFlip(op)local t={[0]=1,[1]=0,[28]=29,[29]=28,[30]=31,[31]=30}return t[op]or op end`;
        }

        function generateVMStrings() {
            return `local VM_OPCODES={MOVE=0,LOADK=1,CALL=28,RETURN=30};local function VM_Execute(bytecode,env) local chunk=loadstring(bytecode);if chunk then setfenv(chunk,env or getfenv()) return chunk() end end;return VM_Execute;`;
        }

        function generateBootstrapper() {
            return `local _ENV=(getfenv and getfenv())or _ENV or _G;local _0x={};_0x[0x1]=_ENV;_0x[0x2]=_0x[0x1]["MNLEHC"];_0x[0x3]=(_0x[0x1]["␀98EN)("]or _0x[0x1]["␀98EN"]);_0x[0x4]=(_0x[0x1]["8I␀97@MNLEHC"]or _0x[0x1]["8I␀97@"]);_0x[0x5]=_0x[0x1]["J␀99␀9788"];_0x[0x6]=_0x[0x1]["N␀97MG"]and _0x[0x1]["N␀97MG"]["MJ␀97	9H"];_0x[0x7]=({...})[1];_0x[0x8]=({...})[2];_0x[0x9]=function(_A)local _B=""for _C in _0x[0x2]["C9␀97N␀99D"](_A,"[^/]+")do local _D=_0x[0x2]["␀98QNA"](_C,1)-0x61;local _E=_0x[0x2]["␀98QNA"](_C,2)-0x61;_B=_B.._0x[0x2]["␀99D␀97L"](_0x[0x3]["␀98PIL"](_D*0x1a+_E,_0x[0x7]))end return _B end;_0x[0xa]=_0x[0x9](_0x[0x8]);_0x[0xb]=_0x[0x4](_0x[0xa]);if _0x[0xb]then _0x[0x5](_0x[0xb])end`;
        }

        function processObfuscation() {
            const src = document.getElementById("txtOriginal").value;
            if(!src.trim()) {
                alert("Vui lòng nhập code gốc trước!");
                return;
            }

            const xorKey = Math.floor(Math.random() * 150) + 50;
            const v2Math = generateMathOps(xorKey, 30);

            const rawAntiEnv = generateAntiEnvLogger();
            const rawAntiTamper = generateAntiTamper();
            const rawAntiDebug = generateAntiDebug();
            const rawSor = src;
            const rawBootstrapper = generateBootstrapper();

            let targetTotalSize = 15000;
            let currentPayloadSize = rawAntiEnv.length + rawAntiTamper.length + rawAntiDebug.length + rawSor.length + rawBootstrapper.length;
            let junkLength = targetTotalSize - currentPayloadSize;

            if (junkLength < 300) junkLength = 300;
            if (junkLength > 14000) junkLength = 14000;

            const rawJunk = generateLargeRandomString(junkLength);

            const combinedV1Raw = rawAntiEnv + "
" + rawAntiTamper + "
" + rawAntiDebug + "
" + rawSor + "
" + rawBootstrapper;

            let xorV1 = "";
            for(let i = 0; i < combinedV1Raw.length; i++) {
                xorV1 += String.fromCharCode(combinedV1Raw.charCodeAt(i) ^ xorKey);
            }
            const v1Str = encodeToCustomFormat(xorV1);

            const rawVM = generateVMStrings();
            const rawOpcode = generateOpcode();
            const combinedV3Raw = rawOpcode + "
" + rawVM + "
-- JUNK: " + rawJunk;

            let xorVM = "";
            for(let i = 0; i < combinedV3Raw.length; i++) {
                xorVM += String.fromCharCode(combinedV3Raw.charCodeAt(i) ^ xorKey);
            }
            const v3Str = encodeToCustomFormat(xorVM);

            const v4Stub = `local _v1,_v2,_v3=...;local _d=function(i,k)local b=""for w in string.gmatch(i,"[^/]+")do local l1=string.byte(w,1)-97;local l2=string.byte(w,2)-97;b=b..string.char(bit32.bxor(l1*26+l2,k))end;return b end;loadstring(_d(_v1,_v2))(_v2,_v3)`;

            let xorV4 = "";
            for(let i = 0; i < v4Stub.length; i++) {
                xorV4 += String.fromCharCode(v4Stub.charCodeAt(i) ^ xorKey);
            }
            const v4Str = encodeToCustomFormat(xorV4);

            let out = `--[ This File Is Protected By MagicObfuscator V1.0.4 ]
`;
            out += `local v1 = "` + v1Str + `"; local v2 = ` + v2Math + `; local v3 = "` + v3Str + `"; local v4 = "" .. "` + v4Str + `"; local _b = ""; for w in string.gmatch(v4, "[^/]+") do local l1 = string.byte(w, 1) - 97; local l2 = string.byte(w, 2) - 97; _b = _b .. string.char(bit32.bxor(l1 * 26 + l2, v2)) end; task.spawn(loadstring(_b), v1, v2, v3);`;

            document.getElementById("txtObfuscated").value = out;
        }

        function downloadFile() {
            const code = document.getElementById("txtObfuscated").value;
            if(!code.trim()) {
                alert("Hãy ấn nút Obfuscate trước khi tải!");
                return;
            }
            const blob = new Blob([code], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Obfuscated.lua.txt";
            link.click();
        }
    </script>
</body>
</html>
