    let b=0,n=0,v=-1, out='';
    for(let i=0;i<<data.length;i++){

    return out;
}

/* ---------- LZ77-like short compress (file 1 style) ---------- */
function lzCompress(s){
    if(!s) return '';
    let out=[], i=0;
    while(i<s.length){
        let bestLen=0, bestOff=0;
        for(let d=1;d<=255 && i-d>=0;d++){
            let len=0;
            while(len<<255 && i+len<s.length && s[i+len]===s[i-d+len]) len++;

        }
        if(bestLen>=4){
            out.push(128+(bestLen-3)); out.push(bestOff);
            i+=bestLen;
        } else {
            let lit=Math.min(127, s.length-i);
            out.push(lit);
            for(let k=0;k<<lit;k++) out.push(s.charCodeAt(i+k));
            i+=lit;
        }
    }
    return String.fromCharCode(...out);
}
function lzDecompress(s){
    let out=[], i=0;
    while(i<s.length){
        let b=s.charCodeAt(i++);
        if(b<=127){
            for(let k=0;k<b && i<s.length;k++) out.push(s.charCodeAt(i++));
        } else {
            let len=(b-128)+3, off=s.charCodeAt(i++);
            if(off===undefined) break;
            let start=out.length-off;
            for(let k=0;k<<len;k++) out.push(out[start+k]);
        }
    }
    return String.fromCharCode(...out);
}

/* ==================== MAIN OBFUSCATOR ==================== */

function processObfuscation(){
    const src = document.getElementById("txtOriginal").value;
    if(!src.trim()){ alert("Vui lòng nhập code gốc!"); return; }
    const mode = document.querySelector('input[name="mode"]:checked').value;

    const xorKey = randInt(50,200);
    const v2Math = genMathExpr(xorKey, 30);

    // Build payload
    let rawPayload = src;
    let antiTamperCode = '';
    let vmStringsCode = '';
    let encryptStringCode = '';

    if(mode==='vmanti' || mode==='all'){
        // AntiTamper block giống file (2)
        antiTamperCode = `local _e=getfenv and getfenv() or _ENV;local _i=_e.debug and _e.debug.getinfo;if type(_i)=="function" then local c=pcall(function()return _i(2)end) if not c then while true do end end end;if _e.debugresults or _e._25ms then while true do end end;local _t=type(_e.table)=="table" and _e.table;if _t and type(getmetatable(_t))=="table" then while true do end end;`;
    }

    if(mode==='vmenc' || mode==='all'){
        // EncryptString helpers giống file (1)
        encryptStringCode = `local B91={};local function b91e(s)local b=0,n=0,v=-1,o="" for i=1,#s do local p=B91[s:byte(i)] if p then if v<<0 then v=p else v=v+p*91 b=b|(v<<n) n=n+(v&8191)>88 and 13 or 14 v=-1 while n>7 do o=o..string.char(b&255) b=b>>8 n=n-8 end end end end if v>=0 then o=o..string.char((b|(v<<n))&255) end return o end;`;
    }

    // Combine raw
    let combinedRaw = '';
    if(antiTamperCode) combinedRaw += antiTamperCode + '\n';
    if(encryptStringCode) combinedRaw += encryptStringCode + '\n';
    combinedRaw += rawPayload;

    // Junk code giống file gốc
    const junkLen = Math.max(300, Math.min(14000, 15000 - combinedRaw.length));
    const junk = Array.from({length:junkLen},()=>String.fromCharCode(33+Math.floor(Math.random()*94))).join('');
    combinedRaw = `-- JUNK: ${junk}\n` + combinedRaw;

    // Encrypt v1 (custom format giống HTML v1)
    let xorV1 = '';
    for(let i=0;i<<combinedRaw.length;i++) xorV1 += String.fromCharCode(combinedRaw.charCodeAt(i) ^ xorKey);
    const v1Str = encodeCustom(xorV1);

    // VM Strings (giả lập)
    const rawVM = `local VM_OPCODES={MOVE=0,LOADK=1,CALL=28,RETURN=30};local function VM_Execute(b,e) local c=loadstring(b);if c then setfenv(c,e or getfenv()) return c() end end;return VM_Execute;`;

    const v3Str = encodeCustom(xorVM);

    // Build Lua output theo đúng format return({...}):Init(ENV)
    let out = '';

    // Header comment
    out += `--[ This File Protected by MagicObfuscator V2 — Mode: ${mode.toUpperCase()} ]\n`;

    // Generate VM core
    const vm = generateVMCore();
    let tableBody = vm.body;

    if(mode==='vmenc' || mode==='all'){
        const enc = generateEncryptStringLayer();
        tableBody += enc.body;

        const anti = generateAntiTamperLayer();
        tableBody += anti.body;
    }

    // Init function name ngẫu nhiên
    const initName = randName(randInt(4,6));

    out += `return({${tableBody}}):${initName}((_ENV or(getfenv and getfenv())or _G))\n`;

    // Dòng thứ 2: bootstrapper giải mã và chạy (giống cấu trúc file gốc)

function downloadFile(){
    const code = document.getElementById("txtObfuscated").value;
    if(!code.trim()){ alert("Hãy ấn Obfuscate trước!"); return; }
    const blob = new Blob([code], {type:"text/plain;charset=utf-8"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "obfuscated.lua.txt";
    link.click();
}
